version: "3.8"

services:
  python-charts:
    build:
      context: ./python-charts
      dockerfile: Dockerfile
    container_name: papsi-python-charts
    ports:
      - "5100:5100"
    restart: unless-stopped
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
